openapi: 3.0.0
info:
  title: Multi-Carrier Shipping API
  version: 1.0.0
  description: A microservice REST API for orchestrating, registering, and tracking multi-carrier shipments.
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      summary: Health check endpoint
      description: Returns the health status of the service.
      responses:
        '200':
          description: Service is healthy and operational.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "UP"

  /api/v1/shipments:
    post:
      summary: Create a shipment
      description: Registers a new shipment in the system with tracking and origin/destination details.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - carrier
                - tracking_number
                - weight
              properties:
                carrier:
                  type: string
                  description: The carrier name (e.g., FedEx, DHL, UPS).
                  example: "FedEx"
                tracking_number:
                  type: string
                  description: Unique carrier tracking ID.
                  example: "TRK-100293"
                weight:
                  type: number
                  format: float
                  description: Shipment weight in kilograms.
                  example: 14.8
                origin:
                  type: string
                  description: Shipment dispatch address/city.
                  example: "New York"
                destination:
                  type: string
                  description: Shipment target address/city.
                  example: "Los Angeles"
      responses:
        '201':
          description: Shipment successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '400':
          description: Invalid request payload or validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Shipment with this tracking number already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List all shipments
      description: Retrieves a list of all registered shipments.
      responses:
        '200':
          description: A list of shipments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shipment'

  /api/v1/shipments/{id}:
    get:
      summary: Get shipment by ID
      description: Retrieves a specific shipment by its unique system ID (UUID).
      parameters:
        - name: id
          in: path
          required: true
          description: Unique shipment UUID.
          schema:
            type: string
            format: uuid
            example: "7063a6e9-ee76-4b20-a541-fa6413054edc"
      responses:
        '200':
          description: Shipment details retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'
        '400':
          description: Missing shipment ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Shipment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "7063a6e9-ee76-4b20-a541-fa6413054edc"
        carrier:
          type: string
          example: "FedEx"
        tracking_number:
          type: string
          example: "TRK-100293"
        weight:
          type: number
          format: float
          example: 14.8
        origin:
          type: string
          example: "New York"
        destination:
          type: string
          example: "Los Angeles"
        status:
          type: string
          example: "CREATED"
        created_at:
          type: string
          format: date-time
          example: "2026-05-20T12:02:58.415929+05:30"
        updated_at:
          type: string
          format: date-time
          example: "2026-05-20T12:02:58.415929+05:30"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: "shipment not found"
