services:
  # ==========================================
  # INFRASTRUCTURE
  # ==========================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # PostgreSQL - One per service (Database-per-Service pattern)
  postgres-shipment:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shipments
    ports:
      - "5431:5432"
    volumes:
      - shipment-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-carrier:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: carriers
    ports:
      - "5432:5432"
    volumes:
      - carrier-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-rate:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rates
    ports:
      - "5433:5432"
    volumes:
      - rate-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-label:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: labels
    ports:
      - "5434:5432"
    volumes:
      - label-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-tracking:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tracking
    ports:
      - "5435:5432"
    volumes:
      - tracking-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-address:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: addresses
    ports:
      - "5436:5432"
    volumes:
      - address-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-billing:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: billing
    ports:
      - "5437:5432"
    volumes:
      - billing-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-return:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: returns
    ports:
      - "5438:5432"
    volumes:
      - return-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # MICROSERVICES
  # ==========================================

  shipment-service:
    build:
      context: .
      dockerfile: ./shipment-service/Dockerfile
    ports:
      - "8001:8081"
    environment:
      PORT: 8081
      DB_HOST: postgres-shipment
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: shipments
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres-shipment:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  carrier-integration-service:
    build:
      context: .
      dockerfile: ./carrier-integration-service/Dockerfile
    ports:
      - "8002:8082"
    environment:
      PORT: 8082
      DB_HOST: postgres-carrier
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: carriers
    depends_on:
      postgres-carrier:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rate-comparison-service:
    build:
      context: .
      dockerfile: ./rate-comparison-service/Dockerfile
    ports:
      - "8003:8083"
    environment:
      PORT: 8083
      DB_HOST: postgres-rate
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: rates
      KAFKA_BROKERS: kafka:29092
      CARRIER_SERVICE_URL: http://carrier-integration-service:8082
    depends_on:
      postgres-rate:
        condition: service_healthy
      kafka:
        condition: service_healthy
      carrier-integration-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  label-generation-service:
    build:
      context: .
      dockerfile: ./label-generation-service/Dockerfile
    ports:
      - "8004:8084"
    environment:
      PORT: 8084
      DB_HOST: postgres-label
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: labels
      KAFKA_BROKERS: kafka:29092
      CARRIER_SERVICE_URL: http://carrier-integration-service:8082
    depends_on:
      postgres-label:
        condition: service_healthy
      kafka:
        condition: service_healthy
      carrier-integration-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8084/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  tracking-service:
    build:
      context: .
      dockerfile: ./tracking-service/Dockerfile
    ports:
      - "8005:8085"
    environment:
      PORT: 8085
      DB_HOST: postgres-tracking
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: tracking
      KAFKA_BROKERS: kafka:29092
      CARRIER_SERVICE_URL: http://carrier-integration-service:8082
    depends_on:
      postgres-tracking:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8085/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  address-validation-service:
    build:
      context: .
      dockerfile: ./address-validation-service/Dockerfile
    ports:
      - "8006:8086"
    environment:
      PORT: 8086
      DB_HOST: postgres-address
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: addresses
      KAFKA_BROKERS: kafka:29092
      CARRIER_SERVICE_URL: http://carrier-integration-service:8082
    depends_on:
      postgres-address:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  billing-service:
    build:
      context: .
      dockerfile: ./billing-service/Dockerfile
    ports:
      - "8007:8087"
    environment:
      PORT: 8087
      DB_HOST: postgres-billing
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: billing
      KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres-billing:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8087/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  return-service:
    build:
      context: .
      dockerfile: ./return-service/Dockerfile
    ports:
      - "8008:8088"
    environment:
      PORT: 8088
      DB_HOST: postgres-return
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: returns
      KAFKA_BROKERS: kafka:29092
      LABEL_SERVICE_URL: http://label-generation-service:8084
    depends_on:
      postgres-return:
        condition: service_healthy
      kafka:
        condition: service_healthy
      label-generation-service:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  notification-service:
    build:
      context: .
      dockerfile: ./notification-service/Dockerfile
    environment:
      KAFKA_BROKERS: kafka:29092
      # SMTP (Yahoo)
      SMTP_HOST: smtp.mail.yahoo.com
      SMTP_PORT: "587"
      SMTP_FROM: kavix@yahoo.com
      SMTP_USER: kavix@yahoo.com
      SMTP_PASSWORD: khmvdagcssmvudxg
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[s]ervice' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SHIPMENT_SERVICE_URL: http://shipment-service:8081
      CARRIER_SERVICE_URL: http://carrier-integration-service:8082
      RATE_SERVICE_URL: http://rate-comparison-service:8083
      LABEL_SERVICE_URL: http://label-generation-service:8084
      TRACKING_SERVICE_URL: http://tracking-service:8085
      ADDRESS_SERVICE_URL: http://address-validation-service:8086
      BILLING_SERVICE_URL: http://billing-service:8087
      RETURN_SERVICE_URL: http://return-service:8088
    depends_on:
      shipment-service:
        condition: service_healthy
      carrier-integration-service:
        condition: service_healthy
      rate-comparison-service:
        condition: service_healthy
      label-generation-service:
        condition: service_healthy
      tracking-service:
        condition: service_healthy
      address-validation-service:
        condition: service_healthy
      billing-service:
        condition: service_healthy
      return-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- --header 'Authorization: Bearer test-token' http://localhost:8080/health | grep -q 'ok' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  shipment-db:
  carrier-db:
  rate-db:
  label-db:
  tracking-db:
  address-db:
  billing-db:
  return-db:
