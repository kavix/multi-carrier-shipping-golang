services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_ENV=development
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=shipping_user
      - DB_PASSWORD=shipping_pass
      - DB_NAME=shipping_db
      - DB_SSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy

  carrier_stats_service:
    build:
      context: .
      dockerfile: Dockerfile.carrierstats
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - APP_ENV=development
      - FREIGHTPULSE_BASE_URL=https://freightpulsehq.com/api/v1
      - FREIGHTPULSE_API_KEY=${FREIGHTPULSE_API_KEY:-}
      - MONGO_URI=mongodb://carrier_stats_mongo:27017
      - MONGO_DB=carrier_stats_logs
    depends_on:
      carrier_stats_mongo:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=shipping_user
      - POSTGRES_PASSWORD=shipping_pass
      - POSTGRES_DB=shipping_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping_user -d shipping_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  carrier_stats_mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=carrier_stats_logs
    volumes:
      - carrier_stats_mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval 'db.runCommand({ ping: 1 })' mongodb://localhost:27017/carrier_stats_logs > /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

volumes:
  postgres_data:
  carrier_stats_mongo_data:
