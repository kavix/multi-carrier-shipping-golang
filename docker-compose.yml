services:
  order-service:
    build:
      context: ./backend
    image: multi-carrier-shipping-golang-order
    command: ["/usr/local/bin/order-service"]
    ports:
      - "8081:8081"

  carrier-service:
    build:
      context: ./backend
    image: multi-carrier-shipping-golang-carrier
    command: ["/usr/local/bin/carrier-service"]
    ports:
      - "8082:8082"

  tracking-service:
    build:
      context: ./backend
    image: multi-carrier-shipping-golang-tracking
    command: ["/usr/local/bin/tracking-service"]
    ports:
      - "8083:8083"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shipuser
      POSTGRES_PASSWORD: shippass
      POSTGRES_DB: shipping
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api-gateway:
    build:
      context: ./backend
    image: multi-carrier-shipping-golang-gateway
    command: ["/usr/local/bin/api-gateway"]
    ports:
      - "8080:8080"
    depends_on:
      - order-service
      - carrier-service
      - tracking-service
      - db

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    image: multi-carrier-shipping-golang-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api-gateway

volumes:
  db-data:
